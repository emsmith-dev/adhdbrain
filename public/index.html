<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADHD Brain</title>
    <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="tailwind-grid.css">
</head>
<body>
    <div class="container">
        <h1>ADHD Brain</h1>
        <form id="todo-form">
            <input type="text" id="todo-input" placeholder="Add a new task..." autocomplete="off" required />
            <label class="completed-checkbox">
                <input type="checkbox" id="todo-completed" /> Completed?
            </label>
            <button type="submit">Add</button>
        </form>
        <div id="progress-section" style="margin-bottom: 24px;">
            <div style="display: flex; align-items: center; justify-content: space-between;">
                <span>Progress</span>
                <span id="coin-reward" style="font-size: 1.3rem; color: #fbbf24; display: flex; align-items: center; gap: 4px;">
                    <span id="coin-count">0</span> 🪙
                </span>
            </div>
            <div id="progress-bar-container" style="background: #e5e7eb; border-radius: 8px; height: 18px; margin-top: 6px;">
                <div id="progress-bar" style="background: #4a90e2; height: 100%; width: 0%; border-radius: 8px; transition: width 0.3s;"></div>
            </div>
        </div>
        <div class="grid grid-cols-2 gap-6" style="margin-bottom: 16px;">
            <div class="p-4 rounded-xl bg-slate-100 outline">
                <h2>To Do</h2>
                <ul id="todo-list-incomplete"></ul>
            </div>
            <div class="p-4 rounded-xl bg-slate-100 outline">
                <h2>Completed</h2>
                <ul id="todo-list-completed"></ul>
            </div>
        </div>
        <div id="motivator">Stay focused! You can do it! 💪</div>
    </div>
    <div id="popup-message" style="display:none; position:fixed; left:50%; top:30%; transform:translate(-50%, -50%); z-index:1000; background:#fff0fa; color:#d72660; border-radius:18px; box-shadow:0 4px 24px rgba(0,0,0,0.12); padding:32px 40px; font-size:1.3rem; text-align:center; font-family:'Segoe UI',cursive,sans-serif; border:3px solid #fbbfef;"></div>
    <canvas id="confetti-canvas" style="display:none; position:fixed; left:0; top:0; width:100vw; height:100vh; pointer-events:none; z-index:999;"></canvas>
    <script src="app.js"></script>
</body>
</html>
